name: Keepalive

# GitHub auto-disables *scheduled* workflows after 60 days without repository
# activity — which would silently kill the severe-weather alert cron. Only
# commits count as activity, so this pushes an empty keepalive commit monthly.
# Its own pushes are activity, which keeps every schedule (including itself)
# alive indefinitely.
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push empty keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive (prevents scheduled-workflow auto-disable)"
          git push
